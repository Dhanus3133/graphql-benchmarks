name: Run benchmarks

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

  run-benchmarks:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Install Setup
        run: "./setup.sh"

      - name: Run benchmarks
        run: "./run_benchmarks.sh"
