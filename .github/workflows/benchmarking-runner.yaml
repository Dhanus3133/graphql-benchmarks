name: Run benchmarks

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

jobs:
  run-benchmarks:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          RUN sudo apt-get update && sudo apt-get install -y build-essential libssl-dev nginx openjdk-17-jdk git curl wget wrk gnuplot

          # Install the latest LTS version of Node.js
          RUN curl -fsSL https://deb.nodesource.com/setup_lts.x | bash - && sudo apt-get install -y nodejs

          # Install Go
          RUN wget https://dl.google.com/go/go1.21.1.linux-amd64.tar.gz -O- | tar xz -C /usr/local
          RUN export PATH=$PATH:/usr/local/go/bin

          # Nginx configurations
          RUN mkdir -p /var/cache/nginx-cache \
              /var/lib/nginx/body \
              /var/lib/nginx/proxy \
              /var/lib/nginx/fastcgi \
              /var/lib/nginx/uwsgi \
              /var/lib/nginx/scgi \
              /var/log/nginx \
              && touch /var/log/nginx/access.log /var/log/nginx/error.log \
              && chown -R www-data:www-data /var/cache/nginx-cache /var/log/nginx /var/lib/nginx

      - name: Install Setup
        run: "bash ./setup.sh"

      - name: Run benchmarks
        run: "./run_benchmarks.sh"
